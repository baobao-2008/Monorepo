<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chợ Phiên Baobao - Đặc Sản & Du Lịch</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .product-card {
        border: 1px solid #ddd;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
      }
      .btn-order {
        background: #28a745;
        color: white;
        border: none;
        padding: 8px 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>🌿 Đặc Sản Hà Giang & Tour Du Lịch</h1>
    <div id="product-list">Đang tải sản phẩm...</div>

    <hr />
    <h2>📝 Form Đặt Hàng</h2>
    <div id="order-form">
      <input type="text" id="custName" placeholder="Tên của bạn" />
      <input type="text" id="custPhone" placeholder="Số điện thoại" />
      <p>Đang chọn: <span id="selected-item">Chưa chọn</span></p>
      <button onclick="submitOrder()" class="btn-order">
        Xác nhận đặt hàng
      </button>
    </div>

    <script>
      let selectedProduct = null;

      // 1. Lấy dữ liệu từ API NestJS
      async function loadProducts() {
        const res = await fetch("http://localhost:3000/products");
        const products = await res.json();

        const listDiv = document.getElementById("product-list");
        listDiv.innerHTML = products
          .map(
            (p) => `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <p>${p.description}</p>
                    <p><b>Giá: ${p.price.toLocaleString()} VNĐ</b></p>
                    <button onclick="selectItem('${p.name}', ${p.id}, ${p.price})">Chọn mua</button>
                </div>
            `,
          )
          .join("");
      }

      function selectItem(name, id, price) {
        selectedProduct = { id, price };
        document.getElementById("selected-item").innerText = name;
      }

      // 2. Gửi đơn hàng về Backend
      async function submitOrder() {
        const name = document.getElementById("custName").value;
        const phone = document.getElementById("custPhone").value;

        if (!selectedProduct || !name || !phone)
          return alert("Vui lòng điền đủ thông tin!");

        const orderData = {
          customerName: name,
          customerPhone: phone,
          orderType: "PRODUCT",
          itemId: selectedProduct.id,
          totalAmount: selectedProduct.price,
        };

        const res = await fetch("http://localhost:3000/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(orderData),
        });

        if (res.ok) {
          alert("Đặt hàng thành công! Baobao sẽ gọi cho bạn sớm.");
        }
      }

      loadProducts();
    </script>
  </body>
</html>
